# Robot helper: runs the app's tests every time you push.
# Green check = healthy code. Red X = something broke (click it to see what).
name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg (needed by the segment tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the test suites
        working-directory: backend
        run: |
          for t in test_session test_errors test_segment test_cleanup test_training test_real_clips test_batch_eval; do
            echo "===== $t ====="
            python $t.py
          done
